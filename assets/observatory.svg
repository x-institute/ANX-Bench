  <path id="capability-signal" d="M95 500 C165 468 206 478 260 430 S345 350 415 364 S520 260 586 280 S700 174 835 136" fill="none" stroke="url(#cyanFade)" stroke-width="3" filter="url(#cyanGlow)"/>
  <path id="response-signal" d="M95 535 C160 528 210 500 270 506 S350 438 425 454 S510 396 585 416 S670 340 715 358 S770 272 835 238" fill="none" stroke="url(#limeFade)" stroke-width="3" filter="url(#limeGlow)"/>
