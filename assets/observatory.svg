<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title>ANX-Bench conceptual observatory plot</title>
  <desc>Two distinct signal paths for AI capability and invariance-linked human response are plotted across time.</desc>
  <defs>
