    <linearGradient id="limeFade" x1="0" x2="1"><stop stop-color="#c9ff45" stop-opacity=".12"/><stop offset="1" stop-color="#c9ff45"/></linearGradient>
    <filter id="cyanGlow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="limeGlow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g fill="none" stroke="#edf1e8" stroke-opacity=".08">
